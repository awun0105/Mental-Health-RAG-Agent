# File này khóa an toàn trước khi git commit
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Linter
        entry: uv run ruff check --fix
        language: system
        types_or: [ python, pyi ]
        require_serial: true
      - id: ruff-format
        name: Ruff Formatter
        entry: uv run ruff format
        language: system
        types_or: [ python, pyi ]
        require_serial: true
      - id: mypy
        name: Mypy Type Checker
        entry: uv run mypy .
        language: system
        types_or: [ python, pyi ]
        pass_filenames: false
        require_serial: true
